name: 每日刷新回测数据

on:
  schedule:
    # 中国时间 16:30 (UTC 8:30) 每天跑一次，A股15点收盘
    - cron: '30 8 * * 1-5'
  workflow_dispatch:   # 手动触发

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install tushare pandas numpy

      - name: 获取最新行情并回测
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: python .github/workflows/refresh_index.py

      - name: 提交更新
        run: |
          git config user.name "turtle-bot"
          git config user.email "turtle-bot@github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "auto: 每日行情数据更新 $(date +'%Y-%m-%d')"
          git push
